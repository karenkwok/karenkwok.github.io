<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewpoint" content="width=device-width, initial-scale=1" />

    <title>Karen Kwok</title>

    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css"
      integrity="sha384-9aIt2nRpC12Uk9gS9baDl411NQApFmC26EwAOH8WgZl5MYYxFfc+NcPb1dKGj7Sk"
      crossorigin="anonymous"
    />

    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link
      rel="android-chrome"
      type="image/png"
      sizes="192x192"
      href="/android-chrome-192x192.png"
    />
    <link
      rel="android-chrome"
      type="image/png"
      sizes="512x512"
      href="/android-chrome-512x512.png"
    />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <link
      href="https://fonts.googleapis.com/css?family=Roboto:300,400,500&amp;display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" type="text/css" href="projects.css" />
    <link rel="stylesheet" type="text/css" href="index.css" />
    <link rel="stylesheet" type="text/css" href="hover.css" />

    <script src="projects.js"></script>
  </head>

  <body>
    <!-- HEADER -->
    <header>
      <nav class="row">
        <a href="index.html"
          ><img
            id="logo"
            class="hvr-grow-rotate"
            src="android-chrome-512x512.png"
        /></a>
        <span id="header-about" class="hvr-grow"
          ><a href="about.html">About</a></span
        >
        <span id="header-resume" class="hvr-grow"
          ><a href="resume.html">Resume</a></span
        >
        <span id="header-projects" class="hvr-grow"
          ><a href="projects.html">Projects</a></span
        >
        <span id="header-contact" class="hvr-grow"
          ><a href="contact.html">Contact</a></span
        >
      </nav>
    </header>

    <!-- MAIN -->
    <main>

      <!-- CAPTURE Button trigger modal -->
      <img
        id="capture"
        src="CAPTURE/Photo Manipulation Workshop_ Session 1.png"
        data-toggle="modal"
        data-target="#exampleModalLong"
      />

      <!-- CAPTURE Modal -->
      <div
        class="modal fade"
        id="exampleModalLong"
        tabindex="-1"
        role="dialog"
        aria-labelledby="exampleModalLongTitle"
        aria-hidden="true"
      >
        <div class="modal-dialog" role="document">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="exampleModalLongTitle">
                UTSC CAPTURE
              </h5>
              <button
                type="button"
                class="close"
                data-dismiss="modal"
                aria-label="Close"
              >
                <span aria-hidden="true">&times;</span>
              </button>
            </div>
            <div id="capture-modal" class="modal-body">
              <img src="CAPTURE/Photo Manipulation Workshop_ Session 1.png" />
              <img src="CAPTURE/Photo Manipulation Workshop_ Session 2.png" />
              <img src="CAPTURE/80's _ 90's Fashion Photoshoot.png" />
              <img src="CAPTURE/CAPTURE Halloween Party.png" />
              <img src="CAPTURE/Capture Spooky Film Project.PNG" />
            </div>
            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-dismiss="modal"
              >
                Close
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Musescore Button trigger modal -->
      <img
        id="musescore"
        src="MUSESCORE/Jolly-Turtles-1.png"
        data-toggle="modal"
        data-target="#exampleModalLong2"
      />

      <!-- Musescore Modal -->
      <div
        class="modal fade"
        id="exampleModalLong2"
        tabindex="-1"
        role="dialog"
        aria-labelledby="exampleModalLongTitle"
        aria-hidden="true"
      >
        <div class="modal-dialog" role="document">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="exampleModalLongTitle">
                Musescore
              </h5>
              <button
                type="button"
                class="close"
                data-dismiss="modal"
                aria-label="Close"
              >
                <span aria-hidden="true">&times;</span>
              </button>
            </div>
            <div id="musescore-modal" class="modal-body">
              <img src="MUSESCORE/Jolly-Turtles-1.png" onclick="playAudio('jolly')"/>
              <img src="MUSESCORE/Jolly-Turtles-2.png" />
              <audio id="jolly">
                <source src="MUSESCORE/Jolly-Turtles.mp3" type="audio/mpeg">
              </audio>
              <img src="MUSESCORE/One-Little-Turtle-1.png" onclick="playAudio('little')"/>
              <audio id="little">
                <source src="MUSESCORE/One-Little-Turtle.mp3" type="audio/mpeg">
              </audio>
            </div>
            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-dismiss="modal"
              >
                Close
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script
      src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
      integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
      integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"
      integrity="sha384-OgVRvuATP1z7JjHLkuOU7Xw704+h835Lr+6QL9UvYjZE3Ipu6Tp75j7Bh/kR0JKI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
